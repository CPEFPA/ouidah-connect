<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2E7D32">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%232E7D32'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>🛂</text></svg>">
    
    <title>OUIDAH CONNECT - Contrôle d'Accès</title>
    
    <!-- Bibliothèque de scan QR Code -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/controle.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- EN-TÊTE -->
    <header class="app-header">
        <div class="header-content">
            <h1>🛂 OUIDAH CONNECT</h1>
            <p class="subtitle">Contrôle d'Accès</p>
        </div>
        <div class="status-bar" id="statusBar">
            <span class="status-dot"></span>
            <span id="statusText">Vérification connexion...</span>
        </div>
    </header>
    
    <!-- CONTENU PRINCIPAL -->
    <main class="app-main">
        
        <!-- Info Agent -->
        <div class="agent-info">
            <label for="agentNom">Nom de l'agent :</label>
            <input type="text" id="agentNom" placeholder="Ex: Agent Koffi" value="Agent">
            <label for="siteChoisi">Site surveillé :</label>
            <select id="siteChoisi">
                <option value="Temple des Pythons">Temple des Pythons</option>
                <option value="Musée d'Histoire de Ouidah">Musée d'Histoire</option>
                <option value="Route des Esclaves">Route des Esclaves</option>
                <option value="Forêt Sacrée de Kpasse">Forêt Sacrée</option>
            </select>
        </div>
        
        <!-- Zone de Scan -->
        <div class="scan-section">
            <div id="reader" class="qr-reader"></div>
            
            <div class="scan-controls">
                <button id="btnStartScan" class="btn btn-primary btn-lg">
                    📷 Démarrer le Scanner
                </button>
                <button id="btnStopScan" class="btn btn-secondary btn-lg" style="display:none;">
                    ⏹️ Arrêter le Scanner
                </button>
            </div>
            
            <!-- Saisie manuelle (si QR illisible) -->
            <div class="manual-entry">
                <p>Saisie manuelle du numéro de billet :</p>
                <div class="manual-input-group">
                    <input type="text" id="manualBillet" placeholder="Ex: OUD-123456">
                    <button id="btnManualCheck" class="btn btn-outline">Vérifier</button>
                </div>
            </div>
        </div>
        
        <!-- Résultat de Validation -->
        <div id="resultatValidation" class="resultat" style="display:none;">
            <div class="resultat-content">
                <div class="resultat-icon" id="resultatIcon">✅</div>
                <h2 id="resultatTitre">BILLET VALIDE</h2>
                <div class="resultat-details" id="resultatDetails"></div>
                <button id="btnCloseResult" class="btn btn-outline">Fermer</button>
            </div>
        </div>
        
        <!-- Statistiques du Jour -->
        <div class="stats-jour">
            <h3>📊 Statistiques du jour</h3>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="statValides">0</div>
                    <div class="stat-label">Billets validés</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statRefuses">0</div>
                    <div class="stat-label">Billets refusés</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="statAttente">0</div>
                    <div class="stat-label">En attente (hors-ligne)</div>
                </div>
            </div>
        </div>
        
    </main>
    
    <!-- PIED DE PAGE -->
    <footer class="app-footer">
        <p>OUIDAH CONNECT v1.0 — Projet Pilote PPP</p>
        <p class="version-info">Dernière sync : <span id="dernierSync">Jamais</span></p>
    </footer>
    
    <!-- Scripts -->
    <!-- Enregistrement du Service Worker pour le mode hors-ligne -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('✅ Service Worker enregistré'))
          .catch(err => console.error('❌ Erreur Service Worker:', err));
      }
    </script>
    <script src="js/controle.js"></script>
</body>
</html>
